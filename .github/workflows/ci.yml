name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Verify generated schema is up to date
        run: |
          cargo run -q -- gen-schema -o config.schema.json
          if ! git diff --quiet config.schema.json; then
            echo "config.schema.json is stale. Run 'just sync-schema' and commit."
            git diff --stat config.schema.json
            exit 1
          fi

  nix:
    name: Nix build & flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix build .#default --print-build-logs
      - run: nix flake check

      # Push the build closure to the xilo cache so other machines
      # (and future CI runs) can substitute instead of rebuilding. Best effort:
      # continue-on-error so a cache outage never fails CI — the build already
      # succeeded.
      - name: setup xilo
        if: github.ref == 'refs/heads/master'
        uses: stubbedev/xilo@v1
        with:
          url: https://nix.stubbe.dev
          cache: default
          token: ${{ secrets.XILO_TOKEN }}

      - name: Push to xilo cache
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
        run: |
          set -u
          out="$(nix build .#default --print-out-paths --no-link)"
          xilo push default "$out"
