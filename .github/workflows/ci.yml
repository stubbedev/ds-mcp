name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Verify generated schema is up to date
        run: |
          cargo run -q -- gen-schema -o config.schema.json
          if ! git diff --quiet config.schema.json; then
            echo "config.schema.json is stale. Run 'just sync-schema' and commit."
            git diff --stat config.schema.json
            exit 1
          fi

  nix:
    name: Nix build & flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix build .#default --print-build-logs
      - run: nix flake check

      # Push the build closure to the attic cache so other machines
      # (and future CI runs) can substitute instead of rebuilding.
      - name: Push to attic cache
        if: github.ref == 'refs/heads/master'
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          nix run nixpkgs#attic-client -- login ci https://nix.stubbe.dev "$ATTIC_TOKEN"
          nix run nixpkgs#attic-client -- push ci:default \
            "$(nix build .#default --print-out-paths --no-link)"
