name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          base="ds-mcp_${GITHUB_REF_NAME}_${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ds-mcp" dist/
          (cd dist && tar -czf "${base}.tar.gz" ds-mcp && rm ds-mcp)

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          base="ds-mcp_${GITHUB_REF_NAME}_${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ds-mcp.exe" dist/
          (cd dist && 7z a "${base}.zip" ds-mcp.exe > /dev/null && rm ds-mcp.exe)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
